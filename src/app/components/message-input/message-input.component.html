<ng-container *ngIf="{ loading: loading$ | async } as state">
  <div class="message-input-container">
    <input class="message-input" type="text" placeholder="Type your message..." [(ngModel)]="inputText" [disabled]="!!state.loading" (keydown.enter)="send(!!state.loading)" aria-label="Message input" />
    <button class="send-button" [disabled]="!!state.loading" (click)="send(!!state.loading)" aria-label="Send message">Send</button>
  </div>
</ng-container>
