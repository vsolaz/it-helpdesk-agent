version: '3.9'

services:
  backend:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "npm install && npx ng serve --host 0.0.0.0"
    ports:
      - "4200:4200"
    depends_on:
      - backend
    environment:
      - NODE_OPTIONS=--max-old-space-size=2048
